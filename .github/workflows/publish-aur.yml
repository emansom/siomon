name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g., v0.3.0)'
        required: true
        type: string
      package:
        description: 'AUR package name'
        required: false
        default: 'siomon'
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      package:
        required: false
        default: 'siomon'
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true
      PKG_GIT_NAME:
        required: true
      PKG_GIT_EMAIL:
        required: true

jobs:
  publish:
    name: Build and push to AUR
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git cargo namcap pacman-contrib openssh jq curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag to commit hash
        id: resolve
        env:
          TAG: ${{ inputs.tag }}
        run: |
          UPSTREAM_REPO="https://github.com/level1techs/siomon.git"
          UPSTREAM_VERSION="${TAG#v}"
          echo "==> Resolving tag $TAG to commit hash..."

          # Try dereferenced tag first (annotated tags), then lightweight
          COMMIT_HASH=$(git ls-remote "$UPSTREAM_REPO" "refs/tags/${TAG}^{}" 2>/dev/null | awk '{print $1}')
          if [ -z "$COMMIT_HASH" ]; then
            COMMIT_HASH=$(git ls-remote "$UPSTREAM_REPO" "refs/tags/${TAG}" 2>/dev/null | awk '{print $1}')
          fi
          if [ -z "$COMMIT_HASH" ]; then
            echo "::error::Could not resolve tag $TAG from $UPSTREAM_REPO"
            exit 1
          fi

          echo "    $TAG -> $COMMIT_HASH"
          echo "commit_hash=$COMMIT_HASH" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch current AUR version
        id: aur_version
        env:
          UPSTREAM_VERSION: ${{ steps.resolve.outputs.upstream_version }}
          AUR_PACKAGE: ${{ inputs.package }}
        run: |
          echo "==> Querying AUR for current ${AUR_PACKAGE} version..."
          AUR_INFO=$(curl -sL "https://aur.archlinux.org/rpc/v5/info?arg[]=${AUR_PACKAGE}")

          AUR_VERSION=$(echo "$AUR_INFO" | jq -r '.results[0].Version // empty')
          if [ -z "$AUR_VERSION" ]; then
            echo "    Package not found on AUR, using pkgrel=1"
            echo "pkgrel=1" >> "$GITHUB_OUTPUT"
          else
            AUR_PKGVER="${AUR_VERSION%-*}"
            AUR_PKGREL="${AUR_VERSION##*-}"
            echo "    Current AUR version: ${AUR_PKGVER}-${AUR_PKGREL}"

            if [ "$AUR_PKGVER" = "$UPSTREAM_VERSION" ]; then
              NEW_PKGREL=$((AUR_PKGREL + 1))
              echo "    Same upstream version, incrementing pkgrel to $NEW_PKGREL"
            else
              NEW_PKGREL=1
              echo "    New upstream version, using pkgrel=1"
            fi
            echo "pkgrel=$NEW_PKGREL" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare PKGBUILD
        env:
          UPSTREAM_VERSION: ${{ steps.resolve.outputs.upstream_version }}
          COMMIT_HASH: ${{ steps.resolve.outputs.commit_hash }}
          PKGREL: ${{ steps.aur_version.outputs.pkgrel }}
        run: |
          # Create non-root builder user (makepkg refuses to run as root)
          useradd -m builder

          cp packaging/aur/PKGBUILD /home/builder/PKGBUILD
          cp packaging/aur/siomon.install /home/builder/siomon.install
          cd /home/builder

          # Update version fields
          sed -i "s/^pkgver=.*/pkgver=${UPSTREAM_VERSION}/" PKGBUILD
          sed -i "s/^_tag=.*/_tag=${COMMIT_HASH} # git rev-parse \"v\$pkgver\"/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${PKGREL}/" PKGBUILD

          chown builder:builder PKGBUILD siomon.install

          # Recompute checksums
          echo "==> Recomputing b2sums..."
          su builder -c "updpkgsums"

      - name: Build and test
        run: |
          cd /home/builder
          echo "==> Building package..."
          su builder -c "makepkg -s --noconfirm"

      - name: Generate .SRCINFO
        run: |
          cd /home/builder
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Validate with namcap
        run: |
          cd /home/builder
          echo "==> Running namcap validation..."
          su builder -c "namcap PKGBUILD" || true
          for pkg in *.pkg.tar.*; do
            [ -f "$pkg" ] && su builder -c "namcap $pkg" || true
          done

      - name: Push to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKG_GIT_NAME: ${{ secrets.PKG_GIT_NAME }}
          PKG_GIT_EMAIL: ${{ secrets.PKG_GIT_EMAIL }}
          UPSTREAM_VERSION: ${{ steps.resolve.outputs.upstream_version }}
          AUR_PACKAGE: ${{ inputs.package }}
        run: |
          # Set up SSH
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur_key"
          chmod 600 "$HOME/.ssh/aur_key"

          # Pre-populate known_hosts with AUR's SSH host key to avoid TOFU prompts.
          # See: https://wiki.archlinux.org/title/AUR_submission_guidelines#Authentication
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> "$HOME/.ssh/known_hosts"

          # Use GIT_SSH_COMMAND to ensure git uses our key and known_hosts
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts"

          # Configure git identity
          git config --global user.name "$PKG_GIT_NAME"
          git config --global user.email "$PKG_GIT_EMAIL"

          # Clone AUR repo, update, commit, push
          git clone "ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git" "/tmp/aur-${AUR_PACKAGE}"
          cd "/tmp/aur-${AUR_PACKAGE}"

          cp /home/builder/PKGBUILD .
          cp /home/builder/.SRCINFO .
          cp /home/builder/siomon.install .

          git add PKGBUILD .SRCINFO siomon.install
          if git diff --cached --quiet; then
            echo "No changes to push."
          else
            git commit -m "Update to ${UPSTREAM_VERSION}"
            git push origin master
            echo "==> Pushed to AUR successfully."
          fi
